<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>СВОЯ КУХНЯ — доставка еды</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary: #1a1a1a;
      --primary-light: #2d2d2d;
      --accent: #ff6b35;
      --accent-hover: #ff5722;
      --bg: #fafafa;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-light: #666666;
      --text-muted: #999999;
      --border: #e5e5e5;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --gold: #FFD700;
      --gold-dark: #FFA500;
    }
    
    * { box-sizing:border-box; margin:0; padding:0; }
    
    html,body{
      height:100%;
      font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .header {
      background:var(--card-bg);
      padding:32px 20px 24px;
      border-bottom:1px solid var(--border);
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(20px);
      background:rgba(255,255,255,0.95);
    }
    
    .header-container {
      max-width:1200px;
      margin:0 auto;
    }
    
    .logo-wrap {
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:20px;
    }
    
    .logo-img {
      width:64px;
      height:64px;
      border-radius:16px;
      object-fit:cover;
      box-shadow:var(--shadow-md);
    }
    
    .header-title {
      font-size:28px;
      font-weight:800;
      color:var(--primary);
      letter-spacing:-0.5px;
      line-height:1.2;
    }
    
    .header-desc {
      font-size:14px;
      color:var(--text-light);
      font-weight:500;
      margin-top:4px;
    }
    
    .promo-banner {
      background:linear-gradient(135deg, var(--accent) 0%, #ff8a65 100%);
      padding:12px 20px;
      border-radius:var(--radius-sm);
      text-align:center;
      color:white;
      font-weight:600;
      font-size:14px;
      letter-spacing:0.5px;
      box-shadow:var(--shadow-md);
    }

    .menu-controls {
      max-width:1200px;
      margin:24px auto 16px;
      padding:0 20px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    
    .menu-controls button {
      background:white;
      color:var(--text);
      border:2px solid var(--border);
      border-radius:var(--radius-sm);
      padding:10px 20px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      font-family:'Inter', sans-serif;
      transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display:flex;
      align-items:center;
      gap:6px;
    }
    
    .menu-controls button:hover {
      border-color:var(--accent);
      transform:translateY(-2px);
      box-shadow:var(--shadow-md);
    }
    
    .menu-controls button.active {
      background:var(--primary);
      color:white;
      border-color:var(--primary);
    }

    .menu {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:24px;
      max-width:1200px;
      margin:0 auto 120px;
      padding:0 20px;
    }

    .product {
      background:var(--card-bg);
      border-radius:var(--radius-md);
      overflow:hidden;
      position:relative;
      border:1px solid var(--border);
      transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display:flex;
      flex-direction:column;
    }
    
    .product:hover {
      transform:translateY(-8px);
      box-shadow:var(--shadow-lg);
      border-color:transparent;
    }
    
    .product.unavailable {
      opacity:0.6;
      filter:grayscale(40%);
    }
    
    .product.unavailable .add-btn,
    .product.unavailable .remove-btn {
      opacity:0.4;
      cursor:not-allowed;
      pointer-events:none;
    }
    
    .product-img-wrap {
      position:relative;
      width:100%;
      height:200px;
      overflow:hidden;
      background:linear-gradient(135deg, #f5f5f5 0%, #e5e5e5 100%);
    }
    
    .favorite-btn {
      position:absolute;
      top:12px;
      right:12px;
      background:rgba(255,255,255,0.95);
      backdrop-filter:blur(10px);
      border:none;
      border-radius:50%;
      width:40px;
      height:40px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:20px;
      z-index:10;
      transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow:var(--shadow-md);
    }
    
    .favorite-btn:hover {
      transform:scale(1.1);
      box-shadow:var(--shadow-lg);
    }
    
    .favorite-btn.active {
      background:rgba(255,107,53,0.1);
    }
    
    .product-img {
      width:100%;
      height:100%;
      object-fit:cover;
      cursor:pointer;
      transition:transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .product:hover .product-img {
      transform:scale(1.08);
    }
    
    .product-content {
      padding:20px;
      flex:1;
      display:flex;
      flex-direction:column;
    }
    
    .product-name {
      font-size:18px;
      font-weight:700;
      color:var(--primary);
      margin-bottom:8px;
      line-height:1.3;
      letter-spacing:-0.3px;
    }
    
    .product-desc {
      color:var(--text-light);
      font-size:14px;
      line-height:1.5;
      margin-bottom:16px;
      flex:1;
      min-height:40px;
    }
    
    .product-footer {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding-top:16px;
      border-top:1px solid var(--border);
    }
    
    .product-price {
      font-size:20px;
      font-weight:700;
      color:var(--primary);
      letter-spacing:-0.5px;
    }
    
    .controls {
      display:flex;
      align-items:center;
      gap:8px;
      background:var(--bg);
      padding:6px;
      border-radius:var(--radius-sm);
    }
    
    .add-btn, .remove-btn {
      border:none;
      border-radius:8px;
      font-size:18px;
      width:36px;
      height:36px;
      cursor:pointer;
      font-family:'Inter', sans-serif;
      font-weight:600;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all 0.2s;
    }
    
    .add-btn {
      background:var(--accent);
      color:white;
    }
    
    .add-btn:hover {
      background:var(--accent-hover);
      transform:scale(1.05);
    }
    
    .remove-btn {
      background:white;
      color:var(--text);
      border:1px solid var(--border);
    }
    
    .remove-btn:hover {
      background:var(--bg);
    }
    
    .controls span {
      min-width:32px;
      text-align:center;
      font-weight:600;
      color:var(--text);
    }

    .dish-of-day-badge {
      position:absolute;
      left:12px;
      top:12px;
      z-index:11;
      display:flex;
      align-items:center;
      gap:6px;
      background:linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color:#1a1a1a;
      padding:8px 12px;
      border-radius:20px;
      font-size:12px;
      font-weight:700;
      box-shadow:0 4px 12px rgba(255,215,0,0.4);
      animation:pulse 2s ease-in-out infinite;
    }

    .star-icon {
      width:20px;
      height:20px;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    @keyframes pulse {
      0%, 100% { transform:scale(1); }
      50% { transform:scale(1.05); }
    }

    .cart-fab {
      position:fixed;
      bottom:24px;
      right:24px;
      background:linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border:none;
      width:68px;
      height:68px;
      border-radius:50%;
      cursor:grab;
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.24);
      transition:box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      touch-action:none;
      user-select:none;
    }
    
    .cart-fab:active { cursor:grabbing; }
    .cart-fab:hover { box-shadow:0 12px 48px rgba(0,0,0,0.3); }
    
    .cart-fab.dragging {
      cursor:grabbing;
      box-shadow:0 16px 64px rgba(0,0,0,0.4);
      transition:none;
    }
    
    .cart-fab:not(.dragging):hover .cart-preview { display:block; }
    
    .cart-icon {
      width:34px;
      height:34px;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    
    .cart-fab-count {
      position:absolute;
      right:-4px;
      top:-4px;
      background:var(--accent);
      color:white;
      font-weight:700;
      border-radius:50%;
      min-width:28px;
      height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      box-shadow:0 4px 12px rgba(255,107,53,0.4);
      border:3px solid var(--bg);
      pointer-events:none;
    }

    .cart-preview {
      display:none;
      position:absolute;
      bottom:80px;
      right:0;
      background:white;
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      padding:16px;
      min-width:280px;
      max-width:320px;
      box-shadow:var(--shadow-lg);
      pointer-events:none;
    }
    
    .cart-preview-title {
      font-weight:700;
      color:var(--primary);
      margin-bottom:12px;
      padding-bottom:12px;
      border-bottom:1px solid var(--border);
      font-size:15px;
    }
    
    .cart-preview-item {
      display:flex;
      justify-content:space-between;
      margin:8px 0;
      font-size:13px;
      color:var(--text-light);
    }
    
    .cart-preview-total {
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid var(--border);
      font-weight:700;
      text-align:right;
      color:var(--primary);
      font-size:15px;
    }

    .modal-bg {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(4px);
      z-index:200;
      align-items:flex-start;
      justify-content:center;
      overflow-y:auto;
      padding:20px;
    }
    
    .modal-bg.show { display:flex; }
    
    .modal {
      background:white;
      border-radius:var(--radius-lg);
      padding:32px;
      max-width:560px;
      width:100%;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
      position:relative;
      margin:40px auto;
      max-height:85vh;
      overflow-y:auto;
      animation:modalSlideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes modalSlideUp {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }
    
    .modal-close {
      position:absolute;
      right:16px;
      top:16px;
      font-size:28px;
      color:var(--text-light);
      background:var(--bg);
      border:none;
      cursor:pointer;
      width:40px;
      height:40px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all 0.2s;
    }
    
    .modal-close:hover {
      background:var(--border);
      transform:rotate(90deg);
    }
    
    .modal-title {
      font-size:24px;
      color:var(--primary);
      margin-bottom:24px;
      font-weight:800;
      letter-spacing:-0.5px;
    }

    .cart-list {
      list-style:none;
      padding:0;
      margin:0 0 20px;
    }
    
    .cart-list li {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
      padding:16px;
      background:var(--bg);
      border-radius:var(--radius-sm);
    }
    
    .cart-total {
      font-size:20px;
      font-weight:800;
      text-align:right;
      margin-bottom:24px;
      color:var(--primary);
      padding:16px;
      background:var(--bg);
      border-radius:var(--radius-sm);
    }

    .form-group { margin-bottom:16px; }
    
    .form-group label {
      display:block;
      font-weight:600;
      margin-bottom:8px;
      color:var(--primary);
      font-size:14px;
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width:100%;
      padding:14px 16px;
      border-radius:var(--radius-sm);
      border:2px solid var(--border);
      font-size:15px;
      background:white;
      font-family:'Inter', sans-serif;
      transition:all 0.2s;
      color:var(--text);
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(255,107,53,0.1);
    }
    
    .form-group textarea {
      resize:vertical;
      min-height:80px;
    }
    
    .geo-group {
      display:flex;
      gap:8px;
      align-items:flex-end;
    }
    
    .geo-group input { flex:1; }
    
    .geo-btn {
      background:var(--primary);
      color:white;
      border:none;
      border-radius:var(--radius-sm);
      padding:14px 16px;
      cursor:pointer;
      font-size:20px;
      flex-shrink:0;
      height:51px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all 0.2s;
    }
    
    .geo-btn:hover {
      background:var(--primary-light);
      transform:scale(1.05);
    }
    
    .geo-btn:disabled {
      opacity:0.5;
      cursor:not-allowed;
      transform:scale(1);
    }

    .info-box {
      background:linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      border:2px solid #ffb74d;
      border-radius:var(--radius-sm);
      padding:14px;
      margin-bottom:16px;
      font-size:13px;
      color:#e65100;
      text-align:center;
      font-weight:500;
    }

    .delivery-info-btn {
      background:var(--primary);
      color:white;
      border:none;
      border-radius:var(--radius-sm);
      padding:14px;
      width:100%;
      font-weight:600;
      cursor:pointer;
      margin-bottom:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-family:'Inter', sans-serif;
      font-size:14px;
      transition:all 0.2s;
    }
    
    .delivery-info-btn:hover {
      background:var(--primary-light);
      transform:translateY(-2px);
      box-shadow:var(--shadow-md);
    }

    .delivery-info-content {
      background:var(--bg);
      border:2px solid var(--border);
      border-radius:var(--radius-sm);
      padding:20px;
      font-size:14px;
      line-height:1.6;
      color:var(--text-light);
    }
    
    .delivery-info-content strong {
      color:var(--primary);
      display:block;
      margin-bottom:12px;
      font-size:15px;
    }
    
    .delivery-time {
      background:linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      padding:12px;
      border-radius:var(--radius-sm);
      margin:12px 0;
      color:#2e7d32;
      text-align:center;
      font-weight:600;
    }

    .btn-primary {
      background:var(--accent);
      color:white;
      border:none;
      border-radius:var(--radius-sm);
      padding:16px 24px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      width:100%;
      font-family:'Inter', sans-serif;
      transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .btn-primary:hover {
      background:var(--accent-hover);
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(255,107,53,0.3);
    }

    .history-item {
      background:var(--bg);
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      padding:20px;
      margin-bottom:16px;
      transition:all 0.2s;
    }
    
    .history-item:hover { box-shadow:var(--shadow-md); }
    
    .history-header {
      display:flex;
      justify-content:space-between;
      font-weight:700;
      color:var(--primary);
      margin-bottom:12px;
      font-size:15px;
    }
    
    .history-products {
      font-size:13px;
      color:var(--text-light);
      margin-bottom:12px;
      line-height:1.6;
    }
    
    .history-footer {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding-top:12px;
      border-top:1px solid var(--border);
    }
    
    .btn-repeat {
      background:var(--accent);
      color:white;
      border:none;
      border-radius:8px;
      padding:8px 16px;
      cursor:pointer;
      font-size:13px;
      font-weight:600;
      transition:all 0.2s;
    }
    
    .btn-repeat:hover {
      background:var(--accent-hover);
      transform:translateY(-2px);
    }

    .image-modal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.95);
      z-index:300;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      backdrop-filter:blur(10px);
    }
    
    .image-modal.show { display:flex; }
    
    .image-modal img {
      max-width:90vw;
      max-height:90vh;
      border-radius:var(--radius-md);
      box-shadow:0 20px 80px rgba(0,0,0,0.8);
    }

    .prod-unavailable {
      position:absolute;
      left:12px;
      right:12px;
      top:12px;
      background:linear-gradient(135deg, 
        rgba(255,87,34,0.25) 0%, 
        rgba(255,107,53,0.35) 50%,
        rgba(255,87,34,0.25) 100%);
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      color:white;
      font-size:13px;
      border-radius:12px;
      padding:10px 16px;
      text-align:center;
      z-index:6;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;
      box-shadow:0 8px 32px rgba(255,87,34,0.3),
                 inset 0 1px 0 rgba(255,255,255,0.3),
                 inset 0 -1px 0 rgba(0,0,0,0.1);
      border:1px solid rgba(255,255,255,0.18);
      text-shadow:0 2px 4px rgba(0,0,0,0.3);
      animation:glassShine 3s ease-in-out infinite;
    }

    @keyframes glassShine {
      0%, 100% {
        box-shadow:0 8px 32px rgba(255,87,34,0.3),
                   inset 0 1px 0 rgba(255,255,255,0.3),
                   inset 0 -1px 0 rgba(0,0,0,0.1);
      }
      50% {
        box-shadow:0 8px 32px rgba(255,87,34,0.5),
                   inset 0 1px 0 rgba(255,255,255,0.5),
                   inset 0 -1px 0 rgba(0,0,0,0.1);
      }
    }

    .loader-overlay {
      position:fixed;
      inset:0;
      background:linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
      z-index:999;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow:hidden;
    }

    .loader-overlay::before {
      content:'';
      position:absolute;
      inset:0;
      background-image: 
        linear-gradient(rgba(26,26,26,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,26,26,0.02) 1px, transparent 1px);
      background-size:50px 50px;
      opacity:0.3;
    }

    .loader-card {
      background:var(--card-bg);
      border-radius:var(--radius-lg);
      padding:48px 40px;
      max-width:420px;
      width:100%;
      box-shadow:var(--shadow-lg);
      border:1px solid var(--border);
      position:relative;
      z-index:10;
    }

    .logo-section {
      text-align:center;
      margin-bottom:32px;
    }

    .loader-logo-img {
      width:80px;
      height:80px;
      border-radius:var(--radius-md);
      object-fit:cover;
      box-shadow:var(--shadow-md);
      margin-bottom:16px;
    }

    .brand-title {
      font-size:24px;
      font-weight:800;
      color:var(--primary);
      letter-spacing:-0.5px;
      margin-bottom:6px;
    }

    .brand-subtitle {
      font-size:13px;
      color:var(--text-light);
      font-weight:500;
    }

    .loading-dots {
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:32px;
    }

    .dot {
      width:12px;
      height:12px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      animation:bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay:0.16s; }
    .dot:nth-child(3) { animation-delay:0.32s; }

    @keyframes bounce {
      0%, 80%, 100% { transform:translateY(0); opacity:0.6; }
      40% { transform:translateY(-16px); opacity:1; }
    }

    .status-text {
      text-align:center;
      margin-bottom:28px;
      min-height:32px;
    }

    .status-text h2 {
      font-size:18px;
      font-weight:600;
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      transition:all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-container { margin-bottom:16px; }

    .progress-bar {
      position:relative;
      height:6px;
      background:var(--bg);
      border-radius:10px;
      overflow:hidden;
      border:1px solid var(--border);
    }

    .progress-fill {
      position:absolute;
      inset-y:0;
      left:0;
      background:linear-gradient(90deg, var(--accent) 0%, var(--accent-hover) 100%);
      border-radius:10px;
      transition:width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow:0 0 20px rgba(255, 107, 53, 0.3);
      width:0;
    }

    .progress-fill::after {
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation:shimmer 2s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { transform:translateX(-100%); }
      100% { transform:translateX(200%); }
    }

    .progress-info {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:12px;
      font-size:13px;
    }

    .progress-percent { color:var(--text-light); font-weight:600; }
    .progress-label { color:var(--text-muted); font-weight:500; }

    .status-indicators {
      display:flex;
      justify-content:center;
      gap:6px;
      margin-bottom:24px;
    }

    .indicator {
      height:4px;
      border-radius:4px;
      transition:all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background:var(--border);
    }

    .indicator.active {
      width:32px;
      background:linear-gradient(90deg, var(--accent) 0%, var(--accent-hover) 100%);
    }

    .indicator:not(.active) { width:4px; }

    .loading-message {
      text-align:center;
      color:var(--text-muted);
      font-size:12px;
      font-weight:500;
      letter-spacing:0.3px;
    }

    .debug-panel {
      position:fixed;
      bottom:100px;
      left:10px;
      background:rgba(0,0,0,0.9);
      color:white;
      padding:12px;
      border-radius:var(--radius-sm);
      font-size:11px;
      max-width:320px;
      z-index:150;
      display:none;
    }

    .garnish-modal-content { max-width:500px; }

    .garnish-title {
      font-size:20px;
      font-weight:700;
      color:var(--primary);
      margin-bottom:16px;
      text-align:center;
    }

    .garnish-subtitle {
      font-size:14px;
      color:var(--text-light);
      margin-bottom:20px;
      text-align:center;
    }

    .garnish-list {
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:20px;
    }

    .garnish-option {
      background:var(--bg);
      border:2px solid var(--border);
      border-radius:var(--radius-sm);
      padding:16px;
      cursor:pointer;
      transition:all 0.2s;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .garnish-option:hover {
      border-color:var(--accent);
      background:white;
      transform:translateX(4px);
    }

    .garnish-option.selected {
      border-color:var(--accent);
      background:rgba(255,107,53,0.05);
    }

    .garnish-option-name { font-weight:600; color:var(--primary); font-size:15px; }
    .garnish-option-price { font-weight:700; color:var(--accent); font-size:15px; }

    .garnish-actions { display:flex; gap:12px; }

    .btn-secondary {
      background:var(--bg);
      color:var(--text);
      border:2px solid var(--border);
      border-radius:var(--radius-sm);
      padding:12px 24px;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      font-family:'Inter', sans-serif;
      transition:all 0.2s;
      flex:1;
    }

    .btn-secondary:hover { border-color:var(--text); background:white; }

    .btn-confirm {
      background:var(--accent);
      color:white;
      border:none;
      border-radius:var(--radius-sm);
      padding:12px 24px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      font-family:'Inter', sans-serif;
      transition:all 0.2s;
      flex:1;
    }

    .btn-confirm:hover { background:var(--accent-hover); transform:translateY(-2px); }
    .btn-confirm:disabled { opacity:0.5; cursor:not-allowed; transform:translateY(0); }
    
    @media (max-width:768px) {
      .menu {
        grid-template-columns:repeat(2,1fr);
        gap:16px;
        margin-bottom:140px;
        padding:0 16px;
      }
      
      .product-img-wrap { height:160px; }
      .product-content { padding:12px; }
      .product-name { font-size:15px; margin-bottom:6px; }
      
      .product-desc {
        font-size:12px;
        margin-bottom:12px;
        min-height:32px;
      }
      
      .product-footer {
        flex-direction:column;
        gap:8px;
        align-items:stretch;
        padding-top:12px;
      }
      
      .product-price { font-size:16px; text-align:center; }
      
      .controls {
        width:100%;
        padding:8px;
        justify-content:center;
      }
      
      .add-btn, .remove-btn { width:44px; height:44px; font-size:20px; }
      .controls span { min-width:44px; font-size:16px; }
      
      .favorite-btn {
        width:36px;
        height:36px;
        font-size:18px;
        top:8px;
        right:8px;
      }

      .dish-of-day-badge { left:8px; top:8px; font-size:11px; padding:6px 10px; }
      .star-icon { width:16px; height:16px; }
      
      .modal { width:100%; padding:24px; margin:20px 0; }
      .header-title { font-size:22px; }
      
      .cart-fab { width:60px; height:60px; bottom:20px; right:20px; }
      .cart-icon { width:30px; height:30px; }
      .cart-preview { bottom:75px; max-width:280px; }
      .menu-controls { padding:0 16px; }
      .menu-controls button { font-size:13px; padding:8px 14px; }
      .loader-card { padding:36px 28px; }
      .brand-title { font-size:20px; }
      .loader-logo-img { width:64px; height:64px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-container">
      <div class="logo-wrap">
        <img class="logo-img" src="logo.png" alt="СВОЯ КУХНЯ">
        <div>
          <div class="header-title">СВОЯ КУХНЯ</div>
          <div class="header-desc">Свежая домашняя еда с доставкой по Нячангу</div>
        </div>
      </div>
      <div class="promo-banner">★ МЕНЮ ★</div>
    </div>
  </div>

  <div class="menu-controls">
    <button onclick="filterMenu('all')" class="active" id="filterAll">Все блюда</button>
    <button onclick="filterMenu('favorites')" id="filterFavorites">⭐ Избранное (<span id="favCount">0</span>)</button>
    <button onclick="showOrderHistory()">📋 История (<span id="historyCount">0</span>)</button>
  </div>

  <div class="menu" id="menu"></div>

  <div id="loader" class="loader-overlay">
    <div class="loader-card">
      <div class="logo-section">
        <img class="loader-logo-img" src="logo.png" alt="СВОЯ КУХНЯ">
        <div class="brand-title">СВОЯ КУХНЯ</div>
        <div class="brand-subtitle">Домашняя еда с доставкой</div>
      </div>
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="status-text">
        <h2 id="statusText">Готовим меню</h2>
      </div>
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-info">
          <span class="progress-percent" id="progressPercent">0%</span>
          <span class="progress-label">Загрузка...</span>
        </div>
      </div>
      <div class="status-indicators" id="indicators">
        <div class="indicator active"></div>
        <div class="indicator"></div>
        <div class="indicator"></div>
        <div class="indicator"></div>
        <div class="indicator"></div>
      </div>
      <div class="loading-message">Пожалуйста, подождите</div>
    </div>
  </div>

  <div id="debugPanel" class="debug-panel"></div>

  <button id="cartFab" class="cart-fab" style="display:none;">
    <svg class="cart-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 24h24l-3 18c-0.5 2.5-2.5 4-5 4h-8c-2.5 0-4.5-1.5-5-4l-3-18z" fill="white" opacity="0.9"/>
      <path d="M20 24h24l-3 18c-0.5 2.5-2.5 4-5 4h-8c-2.5 0-4.5-1.5-5-4l-3-18z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M24 24v-6c0-2.2 1.8-4 4-4h8c2.2 0 4 1.8 4 4v6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="26" cy="50" r="3" fill="white"/>
      <circle cx="38" cy="50" r="3" fill="white"/>
    </svg>
    <span id="cartFabCount" class="cart-fab-count"></span>
    <div class="cart-preview" id="cartPreview"></div>
  </button>

  <div id="cartModal" class="modal-bg"></div>
  <div id="deliveryModal" class="modal-bg"></div>
  <div id="historyModal" class="modal-bg"></div>
  <div id="garnishModal" class="modal-bg"></div>
  <div id="dressingModal" class="modal-bg"></div>
  <div id="imageModal" class="image-modal" onclick="closeImageModal()">
    <img id="imageModalImg" src="" alt="">
  </div>

  <script>
    const SHEET_API_URL = 'https://sheets.googleapis.com/v4/spreadsheets/SPREADSHEET_ID/values/Sheet1?key=API_KEY';
    const SHEET_API_FALLBACK = 'https://script.google.com/macros/s/AKfycbyytR-HwA0y-TnHS_7nygs-_ZkPHDYzQQWFgV3GJSVuvdn93oX0kP92Ti9bQVqW7C_gFg/exec';
    const TELEGRAM_BOT_TOKEN = '7637734194:AAGLXLycqKlHpi4183_4Jaaaz3bwm_SJXqw';
    const TELEGRAM_CHAT_ID = '7567253745';

    let menuData = [];
    let cart = JSON.parse(localStorage.getItem('cart') || '{}');
    let favorites = (JSON.parse(localStorage.getItem('favorites') || '[]') || []).map(n => Number(n)).filter(n => !isNaN(n));
    let orderHistory = JSON.parse(localStorage.getItem('orderHistory') || '[]');
    let savedUserData = JSON.parse(localStorage.getItem('userData') || '{}');
    let orderCounter = parseInt(localStorage.getItem('orderCounter') || '0', 10) || 0;
    let currentFilter = 'all';
    let garnishOptions = [];
    let dressingOptions = [];
    let pendingHotDish = null;
    let pendingSalad = null;

    const FMT = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND', maximumFractionDigits: 0 });

    function toNum(v) {
      if (typeof v === 'number') return v;
      if (!v) return 0;
      let s = String(v).replace(/[^\d,.\-]/g, '').replace(/,/g, '.');
      return parseFloat(s) || 0;
    }

    function esc(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

    function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){ console.warn('Storage error', e); } }

    function parseAvailable(value) {
      if (value === undefined || value === null) return true;
      const str = String(value).trim().toLowerCase();
      const falseValues = ['false', 'нет', 'no', '0', 'н', 'f', 'недоступно', 'unavailable'];
      if (falseValues.includes(str)) return false;
      const trueValues = ['true', 'да', 'yes', '1', 'д', 't', 'доступно', 'available'];
      if (trueValues.includes(str)) return true;
      if (str === '') return true;
      if (!isNaN(Number(str))) return Number(str) !== 0;
      return true;
    }

    function parseDishOfDay(value) {
      if (value === undefined || value === null) return false;
      const str = String(value).trim().toLowerCase();
      return ['true', 'да', 'yes', '1', 'д', 't'].includes(str);
    }

    function parseIsHotDish(value) {
      if (value === undefined || value === null) return false;
      const str = String(value).trim().toLowerCase();
      return ['true', 'да', 'yes', '1', 'д', 't', 'горячее', 'hot'].includes(str);
    }

    function parseIsGarnish(value) {
      if (value === undefined || value === null) return false;
      const str = String(value).trim().toLowerCase();
      return ['true', 'да', 'yes', '1', 'д', 't', 'гарнир', 'garnish'].includes(str);
    }

    function parseIsSalad(value) {
      if (value === undefined || value === null) return false;
      const str = String(value).trim().toLowerCase();
      return ['true', 'да', 'yes', '1', 'д', 't', 'салат', 'salad'].includes(str);
    }

    function parseIsDressing(value) {
      if (value === undefined || value === null) return false;
      const str = String(value).trim().toLowerCase();
      return ['true', 'да', 'yes', '1', 'д', 't', 'заправка', 'dressing'].includes(str);
    }

    function debugLog(message, data) {
      if (false) console.log('[DEBUG]', message, data);
    }

    function startLoaderAnimation() {
      const statuses = [
        { text: 'Готовим меню' },
        { text: 'Загружаем фото' },
        { text: 'Обновляем позиции' },
        { text: 'Проверяем цены' },
        { text: 'Финальные штрихи' }
      ];

      let progress = 0;
      let currentStatusIndex = 0;

      const progressFill = document.getElementById('progressFill');
      const progressPercent = document.getElementById('progressPercent');
      const statusText = document.getElementById('statusText');
      const indicators = document.getElementById('indicators')?.children;

      const progressInterval = setInterval(() => {
        progress += 2;
        if (progress > 100) { progress = 100; clearInterval(progressInterval); }
        if (progressFill) progressFill.style.width = progress + '%';
        if (progressPercent) progressPercent.textContent = Math.round(progress) + '%';
      }, 30);

      const statusInterval = setInterval(() => {
        currentStatusIndex = (currentStatusIndex + 1) % statuses.length;
        if (statusText) statusText.textContent = statuses[currentStatusIndex].text;
        if (indicators) {
          Array.from(indicators).forEach((indicator, index) => {
            indicator.classList.toggle('active', index === currentStatusIndex);
          });
        }
      }, 2000);

      window.loaderIntervals = { progressInterval, statusInterval };
    }

    async function loadMenu() {
      const loaderEl = document.getElementById('loader');
      loaderEl.style.display = 'flex';
      startLoaderAnimation();
      
      try {
        debugLog('Загрузка из основного API', SHEET_API_URL);
        const res = await fetch(SHEET_API_URL);
        if (!res.ok) throw new Error('Primary failed: ' + res.status);
        const json = await res.json();

        if (json?.values?.length > 0) {
          const rows = json.values;
          const headers = rows[0].map(h => String(h||'').trim().toLowerCase());
          const dataRows = rows.slice(1);

          const availableIndex = headers.findIndex(h => h === 'available' || h === 'доступно' || h === 'availability' || h === 'в наличии');
          const dishOfDayIndex = headers.findIndex(h => h === 'dish_of_day' || h === 'блюдо_дня' || h === 'dishofday');
          const isHotDishIndex = headers.findIndex(h => h === 'is_hot_dish' || h === 'горячее' || h === 'hot_dish' || h === 'ishotdish');
          const isGarnishIndex = headers.findIndex(h => h === 'is_garnish' || h === 'гарнир' || h === 'garnish' || h === 'isgarnish');
          const isSaladIndex = headers.findIndex(h => h === 'is_salad' || h === 'салат' || h === 'salad' || h === 'issalad');
          const isDressingIndex = headers.findIndex(h => h === 'is_dressing' || h === 'заправка' || h === 'dressing' || h === 'isdressing');

          menuData = dataRows.map((row, idx) => {
            const obj = {};
            headers.forEach((h, i) => obj[h] = row[i] !== undefined ? row[i] : '');
            return {
              id: idx + 1,
              name: obj.name || obj.title || `Блюдо ${idx+1}`,
              description: obj.description || obj.desc || '',
              img: obj.img || obj.image || '',
              price: toNum(obj.price || obj.cost || obj['цена']),
              available: parseAvailable(obj.available || obj['доступно'] || obj.availability || obj['в наличии'] || (availableIndex >= 0 ? row[availableIndex] : undefined)),
              dishOfDay: parseDishOfDay(obj.dish_of_day || obj['блюдо_дня'] || obj.dishofday || (dishOfDayIndex >= 0 ? row[dishOfDayIndex] : undefined)),
              isHotDish: parseIsHotDish(obj.is_hot_dish || obj['горячее'] || obj.hot_dish || (isHotDishIndex >= 0 ? row[isHotDishIndex] : undefined)),
              isGarnish: parseIsGarnish(obj.is_garnish || obj['гарнир'] || obj.garnish || (isGarnishIndex >= 0 ? row[isGarnishIndex] : undefined)),
              isSalad: parseIsSalad(obj.is_salad || obj['салат'] || obj.salad || (isSaladIndex >= 0 ? row[isSaladIndex] : undefined)),
              isDressing: parseIsDressing(obj.is_dressing || obj['заправка'] || obj.dressing || (isDressingIndex >= 0 ? row[isDressingIndex] : undefined))
            };
          });
          
          garnishOptions = menuData.filter(item => item.isGarnish && item.available);
          dressingOptions = menuData.filter(item => item.isDressing && item.available);
        } else if (json?.menu) {
          menuData = json.menu.map((item, idx) => ({
            id: idx + 1,
            name: item.name || `Блюдо ${idx+1}`,
            description: item.description || '',
            img: item.img || '',
            price: toNum(item.price),
            available: parseAvailable(item.available),
            dishOfDay: parseDishOfDay(item.dish_of_day),
            isHotDish: parseIsHotDish(item.is_hot_dish),
            isGarnish: parseIsGarnish(item.is_garnish),
            isSalad: parseIsSalad(item.is_salad),
            isDressing: parseIsDressing(item.is_dressing)
          }));
          garnishOptions = menuData.filter(item => item.isGarnish && item.available);
          dressingOptions = menuData.filter(item => item.isDressing && item.available);
        } else {
          throw new Error('Unexpected sheet response');
        }
      } catch (err) {
        console.warn('Primary failed, trying fallback...', err);
        try {
          const res2 = await fetch(SHEET_API_FALLBACK);
          if (!res2.ok) throw new Error('Fallback failed: ' + res2.status);
          const j2 = await res2.json();
          if (j2?.menu) {
            menuData = j2.menu.map((item, idx) => ({
              id: idx + 1,
              name: item.name || `Блюдо ${idx+1}`,
              description: item.description || '',
              img: item.img || '',
              price: toNum(item.price),
              available: parseAvailable(item.available),
              dishOfDay: parseDishOfDay(item.dish_of_day),
              isHotDish: parseIsHotDish(item.is_hot_dish),
              isGarnish: parseIsGarnish(item.is_garnish),
              isSalad: parseIsSalad(item.is_salad),
              isDressing: parseIsDressing(item.is_dressing)
            }));
            garnishOptions = menuData.filter(item => item.isGarnish && item.available);
            dressingOptions = menuData.filter(item => item.isDressing && item.available);
          } else {
            throw new Error('Fallback returned no menu');
          }
        } catch (e) {
          console.error('Both APIs failed', e);
          document.getElementById('menu').innerHTML = '<div style="text-align:center;color:var(--text-light);margin:40px;">Ошибка загрузки меню</div>';
        }
      }

      loaderEl.style.display = 'none';
      if (window.loaderIntervals) {
        clearInterval(window.loaderIntervals.progressInterval);
        clearInterval(window.loaderIntervals.statusInterval);
      }
      renderMenu();
    }

    function renderMenu() {
      const menu = document.getElementById('menu');
      let items = currentFilter === 'favorites' ? menuData.filter(i => favorites.includes(i.id)) : menuData.slice();
      items = items.filter(i => !i.isGarnish && !i.isDressing);

      if (!items || items.length === 0) {
        menu.innerHTML = '<div style="text-align:center;color:var(--text-muted);margin:40px;">' +
          (currentFilter === 'favorites' ? 'Нет избранных блюд' : 'Меню пусто') + '</div>';
        updateCartFab();
        document.getElementById('favCount').textContent = favorites.length;
        document.getElementById('historyCount').textContent = (orderHistory || []).length;
        return;
      }

      menu.innerHTML = items.map(item => {
        const isAvailable = item.available;
        const isFav = favorites.includes(item.id);
        const isDishOfDay = item.dishOfDay;
        const imgSrc = item.img ? esc(item.img) : 'https://via.placeholder.com/400x300/f5f5f5/999999?text=Фото';

        return `
        <div class="product ${!isAvailable ? 'unavailable' : ''}" data-id="${item.id}">
          <div class="product-img-wrap">
            ${!isAvailable ? '<div class="prod-unavailable">НЕТ В НАЛИЧИИ</div>' : ''}
            ${isDishOfDay ? `
            <div class="dish-of-day-badge">
              <svg class="star-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M12 6L13 10L17 11L13 12L12 16L11 12L7 11L11 10L12 6Z" fill="#FFD700"/>
              </svg>
              БЛЮДО ДНЯ
            </div>
            ` : ''}
            <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFav(${item.id})">
              ${isFav ? '❤️' : '🤍'}
            </button>
            <img class="product-img" src="${imgSrc}" onclick="showImage('${imgSrc}')" alt="${esc(item.name)}">
          </div>
          <div class="product-content">
            <div class="product-name">${esc(item.name)}</div>
            <div class="product-desc">${esc(item.description)}</div>
            <div class="product-footer">
              <div class="product-price">${FMT.format(item.price)}</div>
              <div class="controls">
                <button class="remove-btn" ${!isAvailable ? 'disabled' : ''} onclick="updateCart(${item.id},-1)">−</button>
                <span id="qty-${item.id}">${cart[item.id]?.qty||0}</span>
                <button class="add-btn" ${!isAvailable ? 'disabled' : ''} onclick="updateCart(${item.id},1)">+</button>

    window.updateCart = function(id, delta) {
      const item = menuData.find(i => i.id === id);
      if (!item) return;
      if (!item.available) return;
      
      if (item.isHotDish && delta > 0) {
        pendingHotDish = { item, delta };
        showGarnishModal();
        return;
      }
      
      if (item.isSalad && delta > 0) {
        pendingSalad = { item, delta };
        showDressingModal();
        return;
      }
      
      addToCart(id, delta);
    };

    function addToCart(id, delta, garnishId = null, dressingId = null) {
      const item = menuData.find(i => i.id === id);
      if (!item) return;
      
      let cartKey = id;
      let itemName = item.name;
      let itemPrice = item.price;
      
      if (garnishId) {
        const garnish = menuData.find(i => i.id === garnishId);
        if (garnish) {
          cartKey = `${id}_g${garnishId}`;
          itemName = `${item.name} + ${garnish.name}`;
          itemPrice = item.price + garnish.price;
        }
      }
      
      if (dressingId) {
        const dressing = menuData.find(i => i.id === dressingId);
        if (dressing) {
          cartKey = `${id}_d${dressingId}`;
          itemName = `${item.name} + ${dressing.name}`;
          itemPrice = item.price + dressing.price;
        }
      }
      
      if (!cart[cartKey]) {
        cart[cartKey] = { 
          id: cartKey, 
          mainId: id,
          garnishId: garnishId,
          dressingId: dressingId,
          name: itemName, 
          price: itemPrice,
          qty: 0,
          available: true 
        };
      }
      
      cart[cartKey].qty = Math.max(0, (cart[cartKey].qty || 0) + delta);
      if (cart[cartKey].qty === 0) delete cart[cartKey];
      
      updateQuantityDisplays();
      save('cart', cart);
      updateCartFab();
      if (document.getElementById('cartModal').classList.contains('show')) showCartModal();
    }

    function updateQuantityDisplays() {
      menuData.forEach(item => {
        const qtyEl = document.getElementById(`qty-${item.id}`);
        if (qtyEl) {
          let totalQty = 0;
          Object.values(cart).forEach(cartItem => {
            if (cartItem.mainId === item.id || cartItem.id === item.id) {
              totalQty += cartItem.qty || 0;
            }
          });
          qtyEl.textContent = totalQty;
        }
      });
    }

      document.getElementById('cartFabCount').textContent = count || '';

      const preview = document.getElementById('cartPreview');
      const items = Object.values(cart);
      if (!items.length) {

    window.removeFromCart = function(cartKey) {
      if (cart[cartKey]) {
        cart[cartKey].qty = Math.max(0, cart[cartKey].qty - 1);
        if (cart[cartKey].qty === 0) delete cart[cartKey];
        save('cart', cart);
        updateCartFab();
        updateQuantityDisplays();
        showCartModal();
      }
    };

    window.duplicateCartItem = function(cartKey) {
      if (cart[cartKey]) {
        const item = cart[cartKey];
        if (item.mainId && item.garnishId) {
          addToCart(item.mainId, 1, item.garnishId);
        } else if (item.mainId && item.dressingId) {
          addToCart(item.mainId, 1, null, item.dressingId);
        } else if (item.mainId) {
          const mainItem = menuData.find(i => i.id === item.mainId);
          if (mainItem && mainItem.isHotDish) {
            pendingHotDish = { item: mainItem, delta: 1 };
            showGarnishModal();
          } else if (mainItem && mainItem.isSalad) {
            pendingSalad = { item: mainItem, delta: 1 };
            showDressingModal();
          } else {
            addToCart(item.mainId, 1);
          }
        } else {
          addToCart(parseInt(cartKey), 1);
        }
      }
    };

    window.getLocation = function(ev) {
      const btn = ev?.target || document.querySelector('.geo-btn');
      if (btn) { btn.disabled = true; btn.textContent = '⏳'; }

      if (!navigator.geolocation) {
        alert('Геолокация не поддерживается вашим браузером');
        if (btn) { btn.disabled = false; btn.textContent = '📍'; }
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=en`);
            const data = await response.json();
            let address = '';
            if (data.address) {
              const parts = [];
              if (data.address.road) parts.push(data.address.road);
              if (data.address.house_number) parts.push(data.address.house_number);
              if (data.address.suburb || data.address.neighbourhood) parts.push(data.address.suburb || data.address.neighbourhood);
              if (data.address.city || data.address.town) parts.push(data.address.city || data.address.town);
              address = parts.length > 0 ? parts.join(', ') : data.display_name;
            } else {
              address = data.display_name || '';
            }
            const coords = `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
            const addrEl = document.getElementById('address');
            if (addrEl) addrEl.value = `${address} (${coords})`;
          } catch (error) {
            const addrEl = document.getElementById('address');
            if (addrEl) addrEl.value = `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
          }
          if (btn) { btn.disabled = false; btn.textContent = '📍'; }
        },
        (error) => {
          alert('Не удалось определить местоположение. Пожалуйста, введите адрес вручную.');
          if (btn) { btn.disabled = false; btn.textContent = '📍'; }
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    };

    window.sendOrder = async function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const payment = document.getElementById('payment').value;
      const address = document.getElementById('address').value.trim();
      const comment = document.getElementById('comment').value.trim();

      if (!name || !phone || !payment || !address) {
        alert('Пожалуйста, заполните обязательные поля.');
        return;
      }

      const items = Object.values(cart);
      if (!items.length) { alert('Корзина пуста.'); return; }

      orderCounter += 1;
      save('orderCounter', orderCounter);

      const total = items.reduce((s,i)=>s + (i.price||0) * (i.qty||0), 0);
      let text = `Новый заказ #${orderCounter}\n`;
      text += `Клиент: ${name}\n`;
      text += `Телефон: ${phone}\n`;
      text += `Оплата: ${payment}\n`;
      text += `Адрес: ${address}\n`;
      if (comment) text += `Комментарий: ${comment}\n`;
      text += `\nЗаказ:\n`;
      items.forEach(i => {
        text += `• ${i.name} x${i.qty} — ${FMT.format((i.price||0)*i.qty)}\n`;
      });
      text += `\nИтого: ${FMT.format(total)}\n`;

      savedUserData = { name, phone, payment, address, comment };
      save('userData', savedUserData);

      const orderRecord = {
        id: orderCounter,
        ts: new Date().toISOString(),
        name, phone, payment, address, comment,
        items: items.map(i => ({ id: i.id, mainId: i.mainId, garnishId: i.garnishId, dressingId: i.dressingId, name: i.name, price: i.price, qty: i.qty })),
        total
      };
      orderHistory = orderHistory || [];
      orderHistory.unshift(orderRecord);
      save('orderHistory', orderHistory);

      try {
        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text })
        });
      } catch (err) {
        console.warn('Telegram send failed', err);
      }

      cart = {};
      save('cart', cart);
      updateCartFab();
      closeModal('cartModal');
      alert('Ваш заказ направлен администратору. С вами свяжутся в ближайшее время.');
      renderMenu();
    };

    // ============================================================
    // ИСПРАВЛЕННАЯ ФУНКЦИЯ repeatOrder
    // Проверяет актуальную доступность и цену из menuData
    // ============================================================
    window.repeatOrder = function(orderId) {
      const order = (orderHistory || []).find(o => o.id === orderId);
      if (!order) return alert('Заказ не найден');

      const skipped = [];
      cart = {};

      order.items.forEach(i => {
        // Определяем mainId — для старых записей берём из id, для новых из mainId
        const mainId = i.mainId
          ? parseInt(i.mainId)
          : (typeof i.id === 'string' ? parseInt(i.id.split('_')[0]) : parseInt(i.id));

        // Проверяем актуальный статус блюда в menuData
        const liveItem = menuData.find(m => m.id === mainId);

        if (!liveItem || !liveItem.available) {
          // Блюдо недоступно или удалено из меню — пропускаем
          skipped.push(i.name);
          return;
        }

        // Актуальная цена основного блюда
        let actualPrice = liveItem.price;
        let actualName = liveItem.name;
        let cartKey = String(mainId);
        let garnishId = null;
        let dressingId = null;

        // Обработка гарнира
        const rawGarnishId = i.garnishId
          ? parseInt(i.garnishId)
          : (typeof i.id === 'string' && i.id.includes('_g') ? parseInt(i.id.split('_g')[1]) : null);

        if (rawGarnishId) {
          const liveGarnish = menuData.find(m => m.id === rawGarnishId);
          if (liveGarnish && liveGarnish.available) {
            garnishId = rawGarnishId;
            actualPrice = liveItem.price + liveGarnish.price;
            actualName = `${liveItem.name} + ${liveGarnish.name}`;
            cartKey = `${mainId}_g${rawGarnishId}`;
          } else {
            // Гарнир недоступен — добавляем без него
            actualPrice = liveItem.price;
            actualName = liveItem.name;
          }
        }

        // Обработка заправки
        const rawDressingId = i.dressingId
          ? parseInt(i.dressingId)
          : (typeof i.id === 'string' && i.id.includes('_d') ? parseInt(i.id.split('_d')[1]) : null);

        if (rawDressingId) {
          const liveDressing = menuData.find(m => m.id === rawDressingId);
          if (liveDressing && liveDressing.available) {
            dressingId = rawDressingId;
            actualPrice = liveItem.price + liveDressing.price;
            actualName = `${liveItem.name} + ${liveDressing.name}`;
            cartKey = `${mainId}_d${rawDressingId}`;
          } else {
            actualPrice = liveItem.price;
            actualName = liveItem.name;
          }
        }

        cart[cartKey] = {
          id: cartKey,
          mainId: mainId,
          garnishId: garnishId,
          dressingId: dressingId,
          name: actualName,
          price: actualPrice,
          qty: i.qty,
          available: true
        };
      });

      save('cart', cart);
      closeModal('historyModal');
      renderMenu();

      if (skipped.length) {
        alert(`Следующие позиции сейчас недоступны и не добавлены в корзину:\n• ${skipped.join('\n• ')}`);
      }

      if (Object.keys(cart).length > 0) {
        showCartModal();
      } else {
        alert('Все позиции из этого заказа сейчас недоступны.');
      }
    };

    };

    window.closeImageModal = function() {
      document.getElementById('imageModal').classList.remove('show');
      document.getElementById('imageModalImg').src = '';
    };

    document.addEventListener('click', function(e){
      const modals = ['cartModal','deliveryModal','historyModal','garnishModal','dressingModal'];
      modals.forEach(id => {
        const el = document.getElementById(id);
        if (!el || !el.classList.contains('show')) return;
        if (e.target === el) {
          el.classList.remove('show');
          if (id === 'garnishModal') pendingHotDish = null;
          if (id === 'dressingModal') pendingSalad = null;
        }
      });
    });

    // Draggable cart FAB
    (function initDraggableCart() {
      const fab = document.getElementById('cartFab');
      let isDragging = false;
      let hasMoved = false;
      let currentX, currentY, initialX, initialY;

      fab.addEventListener('mousedown', dragStart);
      fab.addEventListener('touchstart', dragStart, { passive: false });

      function dragStart(e) {
        const touch = e.type === 'touchstart' ? e.touches[0] : e;
        initialX = touch.clientX;
        initialY = touch.clientY;
        const rect = fab.getBoundingClientRect();
        currentX = rect.left;
        currentY = rect.top;
        hasMoved = false;
        isDragging = true;
        fab.classList.add('dragging');
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);
      }

      function drag(e) {
        if (!isDragging) return;
        e.preventDefault();
        hasMoved = true;
        const touch = e.type === 'touchmove' ? e.touches[0] : e;
        const deltaX = touch.clientX - initialX;
        const deltaY = touch.clientY - initialY;
        let newX = Math.max(0, Math.min(currentX + deltaX, window.innerWidth - fab.offsetWidth));
        let newY = Math.max(0, Math.min(currentY + deltaY, window.innerHeight - fab.offsetHeight));
        fab.style.left = newX + 'px';
        fab.style.top = newY + 'px';
        fab.style.right = 'auto';
        fab.style.bottom = 'auto';
      }

      function dragEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        fab.classList.remove('dragging');
        document.removeEventListener('mousemove', drag);
        document.removeEventListener('touchmove', drag);
        document.removeEventListener('mouseup', dragEnd);
        document.removeEventListener('touchend', dragEnd);
        if (!hasMoved) showCartModal();
      }
    })();

    updateCartFab();
    document.getElementById('favCount').textContent = favorites.length;
    document.getElementById('historyCount').textContent = orderHistory.length || 0;
    loadMenu();
  </script>
</body>
</html>
